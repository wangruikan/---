<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>签名位置测试</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 20px; }
        button { padding: 15px 30px; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        .info { background: #e3f2fd; padding: 15px; margin: 20px 0; border-left: 4px solid #2196f3; }
        #status { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 签名位置测试</h1>
    <div class="info">
        <p><strong>说明：</strong>这个工具会在PDF的9个不同位置都添加签名（带编号和红框）</p>
        <p>下载后打开PDF，找到"本人签名："的位置，看看哪个编号最合适</p>
    </div>
    
    <button onclick="testAllPositions()">🎯 测试所有位置（添加9个签名）</button>
    
    <div id="status"></div>

    <script>
        const { PDFDocument, rgb } = PDFLib;
        
        async function testAllPositions() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<p>⏳ 正在处理...</p>';
            
            try {
                const response = await fetch('/api/get-pdf-for-merge');
                const result = await response.json();
                
                if (!result.success) throw new Error(result.message);
                
                const pdfBytes = Uint8Array.from(atob(result.data.pdf_base64), c => c.charCodeAt(0));
                const pdfDoc = await PDFDocument.load(pdfBytes);
                
                if (!result.data.signature_base64) throw new Error('签名图片不存在');
                const signatureBytes = Uint8Array.from(atob(result.data.signature_base64), c => c.charCodeAt(0));
                const signatureImage = await pdfDoc.embedPng(signatureBytes);
                
                const pages = pdfDoc.getPages();
                const lastPage = pages[pages.length - 1];
                const { width, height } = lastPage.getSize();
                
                const positions = [
                    { x: width - 180, y: 150, label: '1' },
                    { x: width - 180, y: 120, label: '2' },
                    { x: width - 180, y: 90, label: '3' },
                    { x: 320, y: 150, label: '4' },
                    { x: 320, y: 120, label: '5' },
                    { x: 320, y: 90, label: '6' },
                    { x: 100, y: 150, label: '7' },
                    { x: 100, y: 120, label: '8' },
                    { x: 100, y: 90, label: '9' },
                ];
                
                positions.forEach(pos => {
                    lastPage.drawImage(signatureImage, {
                        x: pos.x, y: pos.y,
                        width: 100, height: 40
                    });
                    
                    lastPage.drawRectangle({
                        x: pos.x - 2, y: pos.y - 2,
                        width: 104, height: 44,
                        borderColor: rgb(1, 0, 0),
                        borderWidth: 2
                    });
                    
                    lastPage.drawText(pos.label, {
                        x: pos.x + 105, y: pos.y + 15,
                        size: 20,
                        color: rgb(1, 0, 0)
                    });
                });
                
                const modifiedPdfBytes = await pdfDoc.save();
                const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = '签名位置测试.pdf';
                link.click();
                
                statusDiv.innerHTML = '<p style="color: green;">✅ 成功！已下载包含9个测试位置的PDF</p><p>打开PDF，找到"本人签名："位置，看看哪个编号最合适</p>';
                
            } catch (error) {
                statusDiv.innerHTML = '<p style="color: red;">❌ 失败: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
