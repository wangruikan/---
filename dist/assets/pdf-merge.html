<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF签名合成</title>
    <!-- 引入pdf-lib库 -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status.info {
            background-color: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #2196f3;
        }
        .status.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        .status.error {
            background-color: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress.show {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📄</div>
        <h1>PDF签名合成工具</h1>
        <p class="subtitle">一键生成带签名的入职登记表</p>
        
        <button id="mergeBtn" class="btn" onclick="mergePdfWithSignature()">
            🎨 生成带签名的PDF
        </button>
        
        <div id="progress" class="progress">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">准备中...</div>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        async function mergePdfWithSignature() {
            const btn = document.getElementById('mergeBtn');
            const statusDiv = document.getElementById('status');
            const progressDiv = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            try {
                // 禁用按钮
                btn.disabled = true;
                btn.textContent = '⏳ 处理中...';
                
                // 显示进度条
                progressDiv.classList.add('show');
                updateProgress(10, '正在获取PDF数据...');
                
                // 隐藏之前的状态
                statusDiv.classList.remove('show');
                
                // 1. 从后端获取PDF数据
                const response = await fetch('/api/get-pdf-for-merge');
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.message);
                }
                
                console.log('✅ 获取到PDF数据');
                updateProgress(30, '正在解码PDF文档...');
                
                // 2. 解码PDF base64
                const pdfBytes = Uint8Array.from(
                    atob(result.data.pdf_base64), 
                    c => c.charCodeAt(0)
                );
                
                // 3. 加载PDF文档
                const pdfDoc = await PDFDocument.load(pdfBytes);
                console.log('✅ PDF文档加载成功');
                updateProgress(50, '正在解码签名图片...');
                
                // 4. 解码签名图片base64（避免CORS问题）
                if (!result.data.signature_base64) {
                    throw new Error('签名图片不存在');
                }
                
                const signatureBytes = Uint8Array.from(
                    atob(result.data.signature_base64),
                    c => c.charCodeAt(0)
                );
                
                console.log('✅ 签名图片解码成功');
                updateProgress(70, '正在合成PDF和签名...');
                
                // 5. 嵌入签名图片
                const signatureImage = await pdfDoc.embedPng(signatureBytes);
                
                // 6. 获取PDF页面信息
                const pages = pdfDoc.getPages();
                const pageCount = pages.length;
                console.log('📄 PDF总页数:', pageCount);
                
                // 尝试在所有页面找到最合适的位置
                // 通常"本人签名"在最后一页
                const lastPage = pages[pageCount - 1];
                const { width, height } = lastPage.getSize();
                
                console.log('📏 最后一页尺寸:', { width, height });
                
                // 7. 计算签名位置
                // A4纸张：595.28 x 841.89 points
                // 签名应该在 "本人签名：" 文字后面
                const sigWidth = 120;
                const sigHeight = 50;
                
                // 多个可能的位置（从上到下尝试）
                const positions = [
                    { x: width - sigWidth - 60, y: 120, label: '右下角-位置1' },
                    { x: width - sigWidth - 60, y: 100, label: '右下角-位置2' },
                    { x: width - sigWidth - 60, y: 80, label: '右下角-位置3' },
                    { x: 400, y: 120, label: '偏右-位置1' },
                    { x: 400, y: 100, label: '偏右-位置2' },
                ];
                
                // 使用第一个位置（最常见）
                const sigPos = positions[0];
                const sigX = sigPos.x;
                const sigY = sigPos.y;
                
                console.log('📍 签名位置:', sigPos.label, { x: sigX, y: sigY });
                
                // 8. 在PDF上绘制签名（添加边框便于查看）
                lastPage.drawImage(signatureImage, {
                    x: sigX,
                    y: sigY,
                    width: sigWidth,
                    height: sigHeight,
                    opacity: 1,  // 确保完全不透明
                });
                
                // 添加一个红色边框用于调试（帮助确认位置）
                lastPage.drawRectangle({
                    x: sigX - 2,
                    y: sigY - 2,
                    width: sigWidth + 4,
                    height: sigHeight + 4,
                    borderColor: { type: 'RGB', red: 1, green: 0, blue: 0 },
                    borderWidth: 2,
                });
                
                console.log('✅ 签名已添加到PDF（带红色边框）');
                console.log('💡 提示：如果看不到签名，请查找红色边框');
                updateProgress(90, '正在生成最终文档...');
                
                // 9. 保存修改后的PDF
                const modifiedPdfBytes = await pdfDoc.save();
                
                // 10. 创建下载链接
                const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                // 11. 触发下载
                const link = document.createElement('a');
                link.href = url;
                link.download = `${result.data.employee_name}_入职登记表.pdf`;
                link.click();
                
                console.log('✅ PDF下载成功');
                updateProgress(100, '完成！');
                
                // 显示成功消息
                setTimeout(() => {
                    progressDiv.classList.remove('show');
                    statusDiv.className = 'status success show';
                    statusDiv.innerHTML = `
                        <h3 style="margin-bottom: 10px;">✅ 合成成功！</h3>
                        <p>文件名：${result.data.employee_name}_入职登记表.pdf</p>
                        <p>签名已添加到PDF最后一页右下角</p>
                        <p style="margin-top: 10px; color: #666; font-size: 12px;">请检查下载文件夹</p>
                    `;
                }, 500);
                
            } catch (error) {
                console.error('❌ 合成失败:', error);
                
                progressDiv.classList.remove('show');
                statusDiv.className = 'status error show';
                statusDiv.innerHTML = `
                    <h3 style="margin-bottom: 10px;">❌ 合成失败</h3>
                    <p>${error.message}</p>
                    <p style="margin-top: 10px; color: #999; font-size: 12px;">请刷新页面重试</p>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '🎨 生成带签名的PDF';
            }
        }
        
        function updateProgress(percent, text) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }
    </script>
</body>
</html>
